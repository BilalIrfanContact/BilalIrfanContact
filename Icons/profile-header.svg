<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="260" viewBox="0 0 1280 260" role="img" aria-labelledby="title desc">
  <title id="title">Bilal Irfan Profile Header</title>
  <desc id="desc">Gradient banner with name and role.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="55%" stop-color="#0e1a2b"/>
      <stop offset="100%" stop-color="#12324a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7ef9c5"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="260" fill="url(#bg)"/>
  <circle cx="1110" cy="70" r="170" fill="#1a3d57" opacity="0.25"/>
  <circle cx="180" cy="260" r="170" fill="#0f3a54" opacity="0.22"/>
  <rect x="64" y="58" width="8" height="144" rx="4" fill="url(#accent)"/>

  <text x="92" y="120" fill="#f8fbff" font-size="62" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Bilal Irfan</text>
  <text x="94" y="168" fill="#a9c7d9" font-size="28" font-weight="500" font-family="Segoe UI, Arial, sans-serif">Full-Stack Developer • AI Engineer</text>
  <text x="94" y="205" fill="#8fc8e0" font-size="22" font-weight="400" font-family="Segoe UI, Arial, sans-serif">Building AI-powered web applications</text>
</svg>
